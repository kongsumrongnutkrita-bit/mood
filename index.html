<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoodTune - Spotify Mood Co-Pilot</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            nunito: ['Nunito', 'sans-serif'],
            lora: ['Lora', 'serif'],
          },
          animation: {
            'spin-slow': 'spin-slow 15s linear infinite',
            'sound-bar': 'soundBar 0.8s ease-in-out infinite alternate',
          },
          keyframes: {
            'spin-slow': {
              '0%': { transform: 'rotate(0deg)' },
              '100%': { transform: 'rotate(360deg)' },
            },
            soundBar: {
              '0%': { height: '4px' },
              '100%': { height: '16px' },
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Premium Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: rgba(10, 10, 10, 0.3); }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    
    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    
    .glass-panel {
      background: rgba(23, 23, 23, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---
    const IconPlay = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3" /></svg>;
    const IconPause = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="14" y="4" width="4" height="16" rx="1" /><rect x="6" y="4" width="4" height="16" rx="1" /></svg>;
    const IconBack = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
    const IconNext = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4" /><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" strokeWidth="2" strokeLinecap="round" /></svg>;

    // --- Data ---
    const EMOTIONS = [
      { id: "happy", emoji: "😊", label: "Happy", thai: "มีความสุข", color: "#1DB954", bgGradient: "from-[#1DB954]/20 via-neutral-950 to-neutral-950", glowColor: "rgba(29, 185, 84, 0.15)" },
      { id: "sad", emoji: "😢", label: "Sad", thai: "เศร้า", color: "#3b82f6", bgGradient: "from-blue-600/20 via-neutral-950 to-neutral-950", glowColor: "rgba(59, 130, 246, 0.15)" },
      { id: "chill", emoji: "😌", label: "Chill", thai: "สบายๆ", color: "#8b5cf6", bgGradient: "from-purple-600/20 via-neutral-950 to-neutral-950", glowColor: "rgba(139, 92, 246, 0.15)" },
      { id: "hype", emoji: "🔥", label: "Hype", thai: "เดือดๆ", color: "#ef4444", bgGradient: "from-red-600/20 via-neutral-950 to-neutral-950", glowColor: "rgba(239, 68, 68, 0.15)" }
    ];

    // Pointing to local assets/audio/song1.mp3 for all of them for testing purposes.
    const SONGS = [
      { id: 1, title: "เพื่อนเล่น ไม่เล่นเพื่อน", artist: "Tilly Birds", mood: "happy", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 2, title: "วัดปะหล่ะ? (TEST ME)", artist: "4EVE", mood: "happy", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 3, title: "ถ้าเราเจอกันอีก", artist: "Tilly Birds", mood: "sad", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 4, title: "วาดไว้", artist: "BOWKYLION", mood: "sad", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 5, title: "ดวงเดือน", artist: "JOEY PHUWASIT", mood: "chill", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 6, title: "โต๊ะริม", artist: "NONT TANONT", mood: "chill", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 7, title: "ทรงอย่างแบด", artist: "Paper Planes", mood: "hype", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" },
      { id: 8, title: "ธาตุทองซาวด์", artist: "YOUNGOHM", mood: "hype", audioSrc: "assets/audio/lyrics-color-codedenghanrom가사.mp3" }
    ];

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // --- Components ---
    function Dashboard({ onSelectEmotion }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-8 relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-[#1DB954]/10 to-transparent pointer-events-none" />
          
          <div className="z-10 text-center mb-16 space-y-4">
            <h1 className="text-5xl md:text-6xl font-black font-lora tracking-tight bg-gradient-to-br from-white to-neutral-500 bg-clip-text text-transparent drop-shadow-sm">
              MoodTune
            </h1>
            <p className="text-neutral-400 font-nunito text-lg">Local Audio Engine</p>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-4xl w-full z-10">
            {EMOTIONS.map(mood => (
              <button
                key={mood.id}
                onClick={() => onSelectEmotion(mood)}
                className="group relative overflow-hidden rounded-3xl p-6 h-40 flex flex-col justify-between items-start text-left bg-neutral-900/50 border border-neutral-800 hover:border-[#1DB954]/50 transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl hover:shadow-[#1DB954]/10"
              >
                <div 
                  className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none blur-2xl"
                  style={{ background: `radial-gradient(circle at 50% 50%, ${mood.glowColor} 0%, transparent 80%)` }}
                />
                <span className="text-4xl drop-shadow-lg group-hover:scale-110 transition-transform duration-300 relative z-10">
                  {mood.emoji}
                </span>
                <div className="relative z-10 mt-auto">
                  <h3 className="font-bold text-white text-lg">{mood.label}</h3>
                  <p className="text-xs text-neutral-400 font-nunito">{mood.thai}</p>
                </div>
              </button>
            ))}
          </div>
        </div>
      );
    }

    function PlayerView({ mood, onBack }) {
      const playlist = SONGS.filter(s => s.mood === mood.id);
      const [currentSong, setCurrentSong] = useState(playlist[0]);
      
      const [isPlaying, setIsPlaying] = useState(false);
      const [progress, setProgress] = useState(0);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [volume, setVolume] = useState(1);
      
      const audioRef = useRef(null);
      const progressRef = useRef(null);

      // Handle play state
      const togglePlay = () => {
        if (!audioRef.current) return;
        if (isPlaying) {
          audioRef.current.pause();
        } else {
          audioRef.current.play();
        }
        setIsPlaying(!isPlaying);
      };

      const playNext = () => {
        const currentIndex = playlist.findIndex(s => s.id === currentSong.id);
        const nextIndex = (currentIndex + 1) % playlist.length;
        setCurrentSong(playlist[nextIndex]);
        setIsPlaying(true);
      };

      // Play new song when track changes
      useEffect(() => {
        if (audioRef.current) {
          audioRef.current.src = currentSong.audioSrc;
          if (isPlaying) {
            audioRef.current.play().catch(e => {
              console.log("Autoplay prevented or missing file:", e);
              setIsPlaying(false);
            });
          }
        }
      }, [currentSong]);

      // Audio Event Handlers
      const handleTimeUpdate = () => {
        if (!audioRef.current) return;
        const current = audioRef.current.currentTime;
        const dur = audioRef.current.duration;
        setCurrentTime(current);
        if (dur > 0) {
          setProgress((current / dur) * 100);
        }
      };

      const handleLoadedMetadata = () => {
        if (audioRef.current) {
          setDuration(audioRef.current.duration);
        }
      };

      const handleEnded = () => {
        playNext();
      };

      const handleSeek = (e) => {
        if (progressRef.current && audioRef.current) {
          const rect = progressRef.current.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const percentage = clickX / rect.width;
          audioRef.current.currentTime = percentage * duration;
          setProgress(percentage * 100);
        }
      };

      return (
        <div className={`min-h-screen bg-gradient-to-b ${mood.bgGradient} flex flex-col relative`}>
          
          <audio 
            ref={audioRef}
            src={currentSong.audioSrc}
            onTimeUpdate={handleTimeUpdate}
            onLoadedMetadata={handleLoadedMetadata}
            onEnded={handleEnded}
            onPause={() => setIsPlaying(false)}
            onPlay={() => setIsPlaying(true)}
            className="hidden"
          />

          {/* Header */}
          <header className="flex items-center justify-between p-6 glass-panel border-x-0 border-t-0 sticky top-0 z-50">
            <button onClick={onBack} className="text-neutral-400 hover:text-white transition-colors flex items-center gap-2 font-nunito text-sm">
              <IconBack /> Back
            </button>
            <div className="flex items-center gap-2 bg-neutral-900/80 px-4 py-2 rounded-full border border-neutral-800">
              <span className="text-xl">{mood.emoji}</span>
              <span className="text-sm font-bold text-white font-nunito">{mood.label} Vibe</span>
            </div>
          </header>

          <main className="flex-1 max-w-6xl w-full mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 p-8 items-center">
            
            {/* Visualizer / Album Art */}
            <div className="flex flex-col items-center justify-center space-y-12">
              <div className="relative w-72 h-72 md:w-96 md:h-96 group perspective-1000">
                {/* Vinyl Effect */}
                <div className={`absolute inset-0 rounded-full bg-neutral-900 border-[8px] border-neutral-950 shadow-2xl transition-all duration-1000 ${isPlaying ? 'animate-spin-slow translate-x-12' : 'translate-x-0'}`}>
                   <div className="absolute inset-0 rounded-full" style={{ background: 'repeating-radial-gradient(#111 0, #111 2px, #1a1a1a 3px, #1a1a1a 4px)' }}></div>
                   <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 rounded-full bg-neutral-800 border-4 border-neutral-700 flex items-center justify-center">
                     <div className="w-4 h-4 rounded-full bg-black border border-neutral-600"></div>
                   </div>
                </div>
                
                {/* Cover Art */}
                <div className="absolute inset-0 rounded-3xl overflow-hidden shadow-2xl z-10 glass-panel bg-neutral-800 flex items-center justify-center text-6xl font-black text-neutral-700 select-none">
                  <div className="absolute inset-0 bg-gradient-to-br from-[#1DB954]/20 to-transparent" />
                  {currentSong.title.charAt(0)}
                </div>
              </div>

              {/* Controls */}
              <div className="w-full max-w-md space-y-6 text-center">
                <div>
                  <h2 className="text-2xl font-black text-white truncate px-4">{currentSong?.title}</h2>
                  <p className="text-neutral-400 font-nunito mt-1">{currentSong?.artist}</p>
                </div>
                
                {/* Progress Bar */}
                <div className="space-y-2">
                  <div 
                    ref={progressRef}
                    className="h-1.5 w-full bg-neutral-800 rounded-full overflow-hidden cursor-pointer group" 
                    onClick={handleSeek}
                  >
                    <div className="h-full bg-[#1DB954] rounded-full transition-all duration-100 relative" style={{ width: `${progress}%` }}>
                      <div className="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-white rounded-full shadow-md scale-0 group-hover:scale-100 transition-transform"></div>
                    </div>
                  </div>
                  <div className="flex justify-between text-xs text-neutral-500 font-nunito">
                    <span>{formatTime(currentTime)}</span>
                    <span>{formatTime(duration)}</span>
                  </div>
                </div>

                <div className="flex items-center justify-center gap-6">
                  <button onClick={togglePlay} className="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center hover:scale-105 transition-transform shadow-xl">
                    {isPlaying ? <IconPause /> : <IconPlay />}
                  </button>
                  <button onClick={playNext} className="w-12 h-12 rounded-full bg-neutral-800 text-white flex items-center justify-center hover:bg-neutral-700 hover:scale-105 transition-all">
                    <IconNext />
                  </button>
                </div>
              </div>
            </div>

            {/* Playlist */}
            <div className="glass-panel rounded-3xl p-6 h-[600px] overflow-y-auto">
              <h3 className="text-xl font-bold mb-6 font-lora">Up Next</h3>
              <div className="space-y-3">
                {playlist.map((song, idx) => (
                  <button 
                    key={song.id}
                    onClick={() => {
                      setCurrentSong(song);
                      setIsPlaying(true);
                    }}
                    className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${currentSong?.id === song.id ? 'bg-[#1DB954]/10 border border-[#1DB954]/30' : 'hover:bg-white/5 border border-transparent'}`}
                  >
                    <span className="text-neutral-500 text-sm font-bold w-4">{idx + 1}</span>
                    <div className="w-12 h-12 rounded-xl bg-neutral-800 flex items-center justify-center font-bold text-neutral-500 shrink-0">
                      {song.title.charAt(0)}
                    </div>
                    <div className="text-left flex-1 min-w-0">
                      <h4 className={`font-bold truncate ${currentSong?.id === song.id ? 'text-[#1DB954]' : 'text-white'}`}>{song.title}</h4>
                      <p className="text-neutral-400 text-xs truncate font-nunito">{song.artist}</p>
                    </div>
                    {currentSong?.id === song.id && isPlaying && (
                      <div className="flex items-end gap-1 h-4">
                        <div className="w-1 bg-[#1DB954] animate-sound-bar" style={{animationDelay: '0s'}}></div>
                        <div className="w-1 bg-[#1DB954] animate-sound-bar" style={{animationDelay: '0.2s'}}></div>
                        <div className="w-1 bg-[#1DB954] animate-sound-bar" style={{animationDelay: '0.4s'}}></div>
                      </div>
                    )}
                  </button>
                ))}
              </div>
            </div>
          </main>
        </div>
      );
    }

    function App() {
      const [currentMood, setCurrentMood] = useState(null);

      return (
        <div className="text-white">
          {!currentMood ? (
            <Dashboard onSelectEmotion={setCurrentMood} />
          ) : (
            <PlayerView mood={currentMood} onBack={() => setCurrentMood(null)} />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
